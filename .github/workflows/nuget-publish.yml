name: NuGet Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.1.0)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Pack
        run: dotnet pack src/System.Text.Yaml/System.Text.Yaml.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg

      # Uncomment when ready to push to nuget.org:
      # - name: Push to NuGet.org
      #   run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
